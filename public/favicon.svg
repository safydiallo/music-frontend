<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1e4038"/>
      <stop offset="100%" stop-color="#1a3530"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0c842"/>
      <stop offset="100%" stop-color="#a87f18"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Anneau doré -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.9" filter="url(#glow)"/>

  <!-- Arc du casque -->
  <path d="M14 32 C14 19 21 12 32 12 C43 12 50 19 50 32"
        fill="none" stroke="url(#gold)" stroke-width="4.5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Tige gauche -->
  <line x1="14" y1="31" x2="14" y2="35" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Écouteur gauche -->
  <rect x="8" y="34" width="11" height="13" rx="4" fill="url(#gold)"/>

  <!-- Tige droite -->
  <line x1="50" y1="31" x2="50" y2="35" stroke="url(#gold)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Écouteur droit -->
  <rect x="45" y="34" width="11" height="13" rx="4" fill="url(#gold)"/>

  <!-- Ondes sonores (centre, en bas) -->
  <rect x="22" y="42" width="3" height="3"  rx="1.5" fill="#c9a227" opacity="0.5"/>
  <rect x="27" y="39" width="3" height="6"  rx="1.5" fill="#c9a227" opacity="0.75"/>
  <rect x="32" y="37" width="3" height="8"  rx="1.5" fill="#c9a227"/>
  <rect x="37" y="39" width="3" height="6"  rx="1.5" fill="#c9a227" opacity="0.75"/>
  <rect x="42" y="42" width="3" height="3"  rx="1.5" fill="#c9a227" opacity="0.5"/>
</svg>
